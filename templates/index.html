<html>

<head>
    <meta charset="utf-8">
    <title>Django Blog</title>
</head>

<body>
    <h1>welcome to Django Blog!</h1>
    <hr>
    {{ posts }}
    {% for post in posts %}
    <h2>{{ post.title }}</h2>
    <small>{{ post.content }}</small>
    <h6><i>{{ post.slug }}</i></h6>
    <small><i>{{ now|date:"Y-m-d" }}</i></small>
    <hr>
    {% endfor %}
    <h3>現在時間: {{ now }} </h3>
</body>

</html>
