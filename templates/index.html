{% extends "base.html" %}

{% block content %}
    <h1>welcome to Django Blog!</h1>
    <hr />
    {{ posts }} 
    {% for post in posts %}
        <h2>{{ post.title }}</h2>
        <small>{{ post.content }}</small>
        <h6>{{ post.slug }}</h6>
        <small>{{ now|date:"Y-m-d" }}</small>
        <hr />
    {% endfor %}
    
{% endblock %}
